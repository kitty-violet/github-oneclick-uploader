name: Windows build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Source hygiene check
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\check-source-hygiene.ps1

      - name: Build
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build.ps1

      - name: Self-test
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\test.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHubUploader
          path: artifacts/bin/GitHubUploader.exe
